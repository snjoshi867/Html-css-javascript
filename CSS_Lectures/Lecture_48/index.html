<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bouncing Ball</title>

<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    

    .container{
        width: 80vw;
        height: 80vh;
        background: royalblue;
        position: relative;
        overflow: hidden;
    }

    .ball{
        width: 80px;
        height: 80px;
        background: red;
        border-radius: 50%;
        position: absolute;
        bottom: 0;
        left: 0;

        animation: moveBall 5s linear forwards;
        animation-delay: 5s;
    }

    @keyframes moveBall {
        0%{
            left:0;
            bottom:0;
        }
        20%{
            left:20%;
            bottom:180px;
        }
        40%{
            left:40%;
            bottom:0;
        }
        60%{
            left:60%;
            bottom:120px;
        }
        80%{
            left:80%;
            bottom:0;
        }
        100%{
            left:calc(100% - 80px);
            bottom:0;
        }
    }
</style>

</head>
<body>

<div class="container">
    <div class="ball"></div>
</div>

</body>
</html>
