<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            background-color: rgb(201, 234, 154);
        }
        .box1{
            color: black;
            padding: 10px;
            margin: 10px;
            border: 2px rgb(115, 63, 239);
            height: 100px;
            box-sizing: border-box;
        }
        .box2{
            color: brown;
            padding: 10px;
            margin: 10px;
            border: 2px rgb(115, 63, 239);
            height: 100px;
            box-sizing: border-box;
            
        }
        *{
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div class="box box1">I am a box</div>
    <div class="box box2">I an another box</div>

    
</body>
</html>
