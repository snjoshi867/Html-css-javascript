<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS GRID</title>
    <style>
        .container{
            width: 80vw;
            border: 2px solid red;
            display: grid;
            /*grid-template-columns: [first] 120px [seco] 100px [thi];
            grid-template-rows: 100px 100px 100px;*/

            grid-template-columns: 1fr 1fr 1fr repeat(2,1fr);
            row-gap: 10px;
            column-gap: 20px;
            

        }
        .items{
            border: 2px solid black;
            height: 55px;
            width: 55px;
            justify-items: center;
            align-content: center;
            align-items: center;
            

        }
        .item4{
            grid-row: 1/2;
            grid-column: 1/2;
            justify-self: end;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="items ">1</div>
        <div class="items">2</div>
        <div class="items">3</div>
        <div class="items item4">4</div>
        <div class="items">5</div>
    </div>
    
</body>
</html>
