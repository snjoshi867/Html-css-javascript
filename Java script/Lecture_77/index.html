<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card{
            display: flex;
            border: 2px solid black;
            width: 900px;
            justify-content: center;
            align-items: center;
            padding: 10px;
            margin: 5px;
            background-color: black;
        }
        .image img{
            width: 200px;
            border-radius: 5px;

        }
        .text h1, p{
            padding: 2px 0;
            color: white;
        }
        .image{
            position: relative;
            
        }
        .image .capsule {
            position: absolute;
            bottom: 4px;
            z-index: 10;
            right: 5px;
            background: #242020;
            opacity: 0.9;
            color: white;
            padding: 3px;
            border-radius: 3px;
            font-size: 14px;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="image">
                <img src="https://i.ytimg.com/vi/tVzUXW6siu0/hqdefault.jpg?sqp=-oaymwEcCPYBEIoBSFXyq4pqAw4IARUAAIhCGAFwAcABBg==&rs=AOn4CLAwWOixJVrKLFindK92kYMgTcQbw" alt="Gai bhes pani me" >
                <div class="capsule">31:06</div>
            </div>
            <div class="text">
                <h1>Introduction to backend | sigma web dev </h1>
                <p>Code with soham . 727k views . 2 monts ago</p>
            </div>

        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
